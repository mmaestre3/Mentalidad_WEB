<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentalidad Deportiva</title>
    <style>
        :root { --primary: #003366; --accent: #FF9900; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        #loader { text-align: center; padding: 50px; display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { display: block; width: 80%; margin: 15px auto; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; }
        
        #dashboard { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }

        /* Estilos del reproductor */
        #videoModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
        #player { width: 95%; max-width: 1000px; max-height: 80vh; background: #000; border-radius: 8px; }
        .btn-back { margin-top: 20px; background: var(--accent); color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader"><div class="spinner"></div><p>Cargando...</p></div>

    <div id="login-box">
        <h1>Mentalidad Deportiva</h1>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="clave" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Videos de Formación</h2>
            <button onclick="localStorage.removeItem('id_dispositivo'); window.location.reload();" style="background:#dc3545;">Cerrar Sesión</button>
        </div>
        <div class="grid" id="video-grid"></div>
    </div>
</div>

<div id="videoModal">
    <video id="player" controls controlsList="nodownload" preload="metadata"></video>
    <button class="btn-back" onclick="cerrarModal()">← Volver al Menú Principal</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyZhtOlrQOuSfzx9j0asVVZ4IspVzB_dDKWctCcLcUzSGsAn3d_TWqagUywUpLPHSPq/exec"; // REEMPLAZA CON TU URL

    async function login() {
        const u = document.getElementById('usuario').value;
        const p = document.getElementById('clave').value;
        const id = localStorage.getItem('id_dispositivo') || 'web_' + Date.now();
        
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const resp = await fetch(`${API_URL}?action=login&usuario=${u}&clave=${p}&id_dispositivo=${id}`);
            const data = await resp.json();
            if (data.status === "OK") {
                localStorage.setItem('id_dispositivo', id);
                cargarDashboard();
            } else {
                throw new Error(data.msg || "Error en login");
            }
        } catch (e) {
            alert(e.message);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        }
    }

    async function cargarDashboard() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        const resp = await fetch(`${API_URL}?action=getVideos`);
        const videos = await resp.json();
        
        document.getElementById('video-grid').innerHTML = videos.map(v => `
            <div class="card" onclick="abrirVideo('${v.url}')">
                <img src="${v.img}">
                <h3>${v.titulo}</h3>
                <p>${v.desc}</p>
            </div>`).join('');
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    // --- REPRODUCTOR DIRECTO ---
    function abrirVideo(url) {
        const video = document.getElementById('player');
        const modal = document.getElementById('videoModal');
        
        video.src = url;
        video.load();
        modal.style.display = 'flex';
        
        video.play().catch(e => console.log("Se requiere play manual"));
    }

    function cerrarModal() {
        const video = document.getElementById('player');
        video.pause();
        video.src = ""; 
        document.getElementById('videoModal').style.display = 'none';
    }

    window.onload = () => { if(localStorage.getItem('id_dispositivo')) cargarDashboard(); }
</script>
</body>
</html>
