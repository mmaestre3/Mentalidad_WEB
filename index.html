<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formación Web Mentalidad Deportiva</title>
    <style>
        :root { --primary: #003366; --accent: #FF9900; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Spinner */
        #loader { text-align: center; padding: 50px; display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Login */
        #login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { display: block; width: 80%; margin: 15px auto; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--accent); }

        /* Dashboard */
        #dashboard { display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 15px; }
        .btn-logout { background: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader"><div class="spinner"></div><p>Cargando plataforma...</p></div>

    <div id="login-box">
        <h1>Mentalidad Deportiva</h1>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="clave" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>

    <div id="dashboard">
        <div class="header-bar">
            <h2>Videos de Formación</h2>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
        <div class="grid" id="video-grid"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyZhtOlrQOuSfzx9j0asVVZ4IspVzB_dDKWctCcLcUzSGsAn3d_TWqagUywUpLPHSPq/exec"; // REEMPLAZA ESTO

    async function login() {
        const u = document.getElementById('usuario').value;
        const p = document.getElementById('clave').value;
        const id = localStorage.getItem('id_dispositivo') || 'web_' + Date.now();
        
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const resp = await fetch(`${API_URL}?action=login&usuario=${u}&clave=${p}&id_dispositivo=${id}`);
        const data = await resp.json();

        if (data.status === "OK") {
            localStorage.setItem('id_dispositivo', id);
            cargarDashboard();
        } else {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            alert(data.msg || data.status);
        }
    }

    async function cargarDashboard() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        const resp = await fetch(`${API_URL}?action=getVideos`);
        const videos = await resp.json();
        
        const grid = document.getElementById('video-grid');
        grid.innerHTML = videos.map(v => `
            <div class="card">
                <img src="${v.img}" alt="Miniatura">
                <div class="card-body">
                    <h3>${v.titulo}</h3>
                    <p>${v.desc}</p>
                    <a href="${v.url}" target="_blank">Ver Video</a>
                </div>
            </div>`).join('');
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    function cerrarSesion() {
        localStorage.removeItem('id_dispositivo');
        window.location.reload();
    }

    window.onload = () => { if(localStorage.getItem('id_dispositivo')) cargarDashboard(); }
</script>
</body>
</html>
